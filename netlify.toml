[build]
  publish = "dist"
  command = "npm run build"

[[redirects]]
  from = "/api/send-email"
  to = "/.netlify/functions/send-email"
  status = 200

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/api/test-smtp"
  to = "/.netlify/functions/test-smtp"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
